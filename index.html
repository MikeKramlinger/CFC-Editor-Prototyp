<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CFC-Editor Prototyp</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="toolbar">
        <div class="toolbar__header">
          <h1>CFC-Editor Prototyp</h1>
          <div class="toolbar__header-actions">
            <button id="language-toggle" type="button" aria-label="Sprache wechseln">EN</button>
            <button id="theme-toggle" type="button" aria-pressed="false" aria-label="Dark Theme aktivieren">🌙 Dark</button>
          </div>
        </div>
        <div class="toolbar__row toolbar__row--main">
          <button id="routing-mode" type="button">Routing: Bezier</button>
          <button id="bulk-menu-toggle" type="button" aria-expanded="false" aria-controls="bulk-menu">Mehrfach erstellen</button>
          <label for="format-select">Datenformat</label>
          <select id="format-select"></select>
          <button id="export-data" type="button">Export</button>
          <button id="import-data" type="button">Import</button>
          <button id="roundtrip" type="button">Roundtrip-Test</button>
          <button id="quiz-toggle" type="button" aria-expanded="false" aria-controls="quiz-menu">Quiz-Modus</button>
        </div>
        <div id="quiz-menu" class="quiz-menu" hidden>
          <div class="toolbar__row">
            <button id="quiz-back" class="quiz-back-button" type="button" title="Quiz abbrechen und zur Bearbeitung zurückkehren">←</button>
            <button id="quiz-end" type="button">Quiz beenden</button>
          </div>
          <div id="quiz-panel" class="quiz-panel">
            <p id="quiz-description" class="quiz-description"></p>
            <p id="quiz-feedback" class="quiz-feedback" aria-live="polite"></p>
          </div>
        </div>
        <div id="bulk-menu" class="bulk-menu" hidden>
          <label for="bulk-box-count">Anzahl Boxen</label>
          <input id="bulk-box-count" type="number" min="1" step="1" value="6" />
          <fieldset id="bulk-connection-mode-group" class="bulk-connection-mode">
            <legend>Verbindungsmodus</legend>
            <label class="bulk-connection-mode__option">
              <input type="radio" name="bulk-connection-mode" value="count" checked />
              <span class="bulk-connection-mode__title">Manuell (Anzahl)</span>
              <span class="bulk-connection-mode__desc">Nutzt die Zahl im Feld "Anzahl Verbindungen".</span>
            </label>
            <label class="bulk-connection-mode__option">
              <input type="radio" name="bulk-connection-mode" value="single-target" />
              <span class="bulk-connection-mode__title">Output -> anderer Input</span>
              <span class="bulk-connection-mode__desc">Jeder neue Output wird einmal verbunden.</span>
            </label>
            <label class="bulk-connection-mode__option">
              <input type="radio" name="bulk-connection-mode" value="all-to-all" />
              <span class="bulk-connection-mode__title">Output -> alle Inputs</span>
              <span class="bulk-connection-mode__desc">Vollvernetzung aller neuen Knoten untereinander.</span>
            </label>
          </fieldset>
          <label for="bulk-connection-count">Anzahl Verbindungen</label>
          <input id="bulk-connection-count" type="number" min="0" step="1" value="10" />
          <div class="bulk-menu__advanced" aria-label="Optionale Verteilung nach Box-Typ">
            <details id="bulk-type-details" class="bulk-type-details">
              <summary>Typen gezielt verteilen (optional)</summary>
              <div class="bulk-type-details__hint-row">
                <p class="bulk-type-details__hint">Fehlende Boxen werden als "Box" ergänzt.</p>
                <button
                  id="bulk-type-reset"
                  class="bulk-type-reset"
                  type="button"
                  aria-label="Typenverteilung zurücksetzen"
                  title="Typenverteilung zurücksetzen"
                >⟳</button>
              </div>
              <div id="bulk-type-counts" class="bulk-type-counts"></div>
            </details>
          </div>
          <div class="bulk-menu__actions">
            <button id="bulk-create" type="button">Erstellen</button>
          </div>
        </div>
      </section>

      <section class="editor-area">
        <div class="workspace">
          <aside class="toolbox" aria-label="CFC Toolbox">
            <div class="toolbox__header">
              <h2>Toolbox</h2>
              <button id="toolbox-toggle" class="toolbox-toggle" type="button" aria-expanded="true" aria-label="Toolbox einklappen">
                &lt;
              </button>
            </div>
            <div id="toolbox-list" class="toolbox-list"></div>
          </aside>
          <div id="canvas" class="canvas" aria-label="CFC Arbeitsbereich">
            <div class="graph-zoom-overlay" aria-label="Zoom-Steuerung">
              <button id="zoom-out" type="button">-</button>
              <span id="zoom-value" class="zoom-value">100%</span>
              <button id="zoom-in" type="button">+</button>
            </div>
          </div>
        </div>
      </section>

      <section class="data-area">
        <div
          id="data-resizer"
          class="data-resizer"
          role="separator"
          aria-orientation="horizontal"
          aria-label="Datenbereich Höhe anpassen"
          title="Datenbereich Höhe ziehen"
        ></div>
        <div class="data-area__header">
          <label for="data-text">Daten</label>
          <div id="quiz-task-nav-inline" class="quiz-task-nav-inline" hidden>
            <button id="quiz-prev" type="button" aria-label="Vorherige Aufgabe" title="Vorherige Aufgabe">◀</button>
            <select id="quiz-task-select" aria-label="Quiz-Aufgabe"></select>
            <button id="quiz-next" type="button" aria-label="Nächste Aufgabe" title="Nächste Aufgabe">▶</button>
          </div>
          <div id="quiz-timer-inline" class="quiz-timer-inline" hidden>
            <span><strong id="quiz-task-timer">00:00</strong></span>
            <button id="quiz-timer-toggle" type="button">Pause</button>
            <span id="quiz-task-locked" class="quiz-task-locked" title="Aufgabe ist abgeschlossen und gesperrt" hidden>🔒</span>
            <button id="quiz-rework" class="quiz-rework-inline" type="button" hidden>Überarbeiten</button>
          </div>
          <button id="data-toggle" type="button" aria-expanded="false" aria-label="Datenbereich vergrößern">⤢</button>
        </div>
        <div class="data-editor">
          <pre id="data-lines" class="data-lines" aria-hidden="true">1</pre>
          <textarea id="data-text" spellcheck="false"></textarea>
        </div>
        <button
          id="quiz-check-floating"
          class="quiz-check-floating"
          type="button"
          aria-label="Antwort prüfen"
          title="Antwort prüfen"
          tabindex="-1"
          hidden
        >➤</button>
        <p id="metrics" class="metrics" aria-live="polite"></p>
      </section>
    </main>

    <dialog id="participant-name-dialog" class="cfc-participant-dialog">
      <form id="participant-name-form" method="dialog" class="cfc-participant-dialog__form">
        <h3 class="cfc-participant-dialog__title">Quiz-Ergebnis exportieren</h3>
        <label class="cfc-participant-dialog__label" for="participant-name-input">Name</label>
        <input
          id="participant-name-input"
          class="cfc-participant-dialog__input"
          type="text"
          autocomplete="name"
          placeholder="z. B. Max Mustermann"
        />
        <div class="cfc-participant-dialog__actions">
          <button
            id="participant-name-cancel"
            class="cfc-participant-dialog__button cfc-participant-dialog__button--cancel"
            type="button"
          >
            Abbrechen
          </button>
          <button
            id="participant-name-submit"
            class="cfc-participant-dialog__button cfc-participant-dialog__button--submit"
            type="submit"
          >
            Exportieren
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
